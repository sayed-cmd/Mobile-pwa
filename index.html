<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
  <title>CallBridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1a1c22;
      --surface:   #22252e;
      --surface2:  #2a2d38;
      --surface3:  #313542;
      --border:    rgba(255,255,255,0.06);
      --green:     #4caf72;
      --green-dim: rgba(76,175,114,0.15);
      --green-glow:rgba(76,175,114,0.30);
      --red:       #e05555;
      --text:      #e8eaf0;
      --text-sub:  #8b90a0;
      --text-dim:  #555a6a;
      --mono:      'Roboto Mono', monospace;
      --sans:      'Nunito', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    .screen {
      max-width: 420px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0 0 32px;
    }

    /* ───── HEADER ───── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 52px 24px 16px;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
      transition: background 0.4s;
    }
    .status-dot.on {
      background: var(--green);
      box-shadow: 0 0 0 0 var(--green-glow);
      animation: dot-pulse 2.4s ease-in-out infinite;
    }
    @keyframes dot-pulse {
      0%,100% { box-shadow: 0 0 0 0 var(--green-glow); }
      50%      { box-shadow: 0 0 0 5px transparent; }
    }
    .header-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: var(--text);
    }

    /* three-dot */
    .menu-wrap { position: relative; }
    .dots-btn {
      width: 36px; height: 36px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3.5px;
      transition: background 0.2s;
    }
    .dots-btn:hover { background: var(--surface2); }
    .dots-btn i {
      width: 3.5px; height: 3.5px;
      background: var(--text-sub);
      border-radius: 50%;
    }
    .dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 6px;
      min-width: 185px;
      opacity: 0; pointer-events: none;
      transform: translateY(-6px) scale(0.97);
      transform-origin: top right;
      transition: opacity 0.17s, transform 0.17s;
      z-index: 200;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }
    .dropdown.open { opacity: 1; pointer-events: all; transform: translateY(0) scale(1); }
    .dd-item {
      display: flex; align-items: center; gap: 11px;
      padding: 11px 13px;
      border-radius: 9px;
      font-size: 14px; font-weight: 600;
      color: var(--text-sub);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }
    .dd-item:hover { background: var(--surface3); color: var(--text); }
    .dd-item.danger:hover { color: var(--red); }
    .dd-sep { height: 1px; background: var(--border); margin: 5px 0; }

    /* ───── NUMBER HERO ───── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 24px 8px;
      text-align: center;
    }
    .avatar-ring {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: var(--surface2);
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 22px;
      position: relative;
      text-decoration: none;
      transition: background 0.35s, border-color 0.35s, transform 0.18s, box-shadow 0.18s;
    }
    .avatar-ring.active {
      border-color: rgba(76,175,114,0.4);
    }
    .avatar-ring.active::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1.5px solid rgba(76,175,114,0.18);
      animation: ring-expand 2s ease-out infinite;
    }
    .avatar-ring.active::after {
      content: '';
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      border: 1px solid rgba(76,175,114,0.08);
      animation: ring-expand 2s ease-out 0.6s infinite;
    }
    @keyframes ring-expand {
      0%   { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.25); }
    }
    .avatar-icon {
      font-size: 34px;
      line-height: 1;
    }

    .number-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .number-value {
      font-family: var(--mono);
      font-size: 30px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 1.5px;
      line-height: 1.2;
      min-height: 40px;
      transition: color 0.3s;
    }
    .number-value.idle {
      font-family: var(--sans);
      font-size: 17px;
      font-weight: 500;
      color: var(--text-dim);
      letter-spacing: 0;
    }
    .number-time {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 8px;
      font-family: var(--mono);
      min-height: 18px;
      transition: color 0.3s;
    }
    .number-time.visible { color: var(--text-sub); }

    /* incoming flash */
    @keyframes flash-border {
      0%,100% { border-color: rgba(76,175,114,0.4); }
      50%      { border-color: rgba(76,175,114,0.9); }
    }
    .avatar-ring.flash { animation: flash-border 0.4s ease 3; }

    /* avatar callable state */
    .avatar-ring.callable {
      cursor: pointer;
      background: #ffffff;
      border-color: rgba(255,255,255,0.6) !important;
      box-shadow: 0 4px 28px rgba(255,255,255,0.2);
    }
    .avatar-ring.callable:active { transform: scale(0.91); }
    .avatar-ring.callable:hover  { transform: scale(1.06); box-shadow: 0 8px 36px var(--green-glow); }

    /* ───── DIVIDER ───── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 24px;
    }

    /* ───── RECENT CALLS ───── */
    .recents {
      padding: 20px 24px 0;
    }
    .recents-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .recents-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    .recents-clear {
      font-size: 12px; font-weight: 600;
      color: var(--text-dim);
      cursor: pointer;
      transition: color 0.2s;
    }
    .recents-clear:hover { color: var(--red); }

    .recent-list { display: flex; flex-direction: column; gap: 2px; }

    .recent-empty {
      text-align: center;
      padding: 24px 0;
      color: var(--text-dim);
      font-size: 14px;
    }

    .recent-item {
      display: flex; align-items: center;
      padding: 13px 14px;
      border-radius: 13px;
      gap: 14px;
      transition: background 0.15s;
      animation: item-in 0.22s ease;
      cursor: default;
    }
    .recent-item:hover { background: var(--surface2); }
    @keyframes item-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .recent-icon {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 17px;
    }
    .recent-info { flex: 1; min-width: 0; }
    .recent-num {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .recent-time {
      font-size: 12px;
      color: var(--text-sub);
      margin-top: 2px;
    }
    .recent-call {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--green-dim);
      border: 1px solid rgba(76,175,114,0.2);
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
    }
    .recent-call:hover { background: var(--green-glow); transform: scale(1.1); }
    .recent-call svg { width: 15px; height: 15px; }

    /* ───── QR READER ───── */
    #qr-reader {
      display: none;
      margin: 0 24px 20px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    /* ───── TOAST ───── */
    .toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 18px;
      font-size: 13px; font-weight: 600;
      color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
      display: flex; align-items: center; gap: 8px;
      transition: transform 0.28s cubic-bezier(0.34,1.4,0.64,1), opacity 0.28s;
      opacity: 0; z-index: 999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>
<div class="screen">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="status-dot" id="statusDot"></div>
      <span class="header-title">CallBridge</span>
    </div>
    <div class="menu-wrap">
      <div class="dots-btn" id="menuBtn">
        <i></i><i></i><i></i>
      </div>
      <div class="dropdown" id="dropdown">
        <div class="dd-item" id="pasteUID">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
          </svg>
          Paste UID
        </div>
        <div class="dd-item" id="scanQR">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
            <path d="M14 14h3v3M20 14v.01M14 20h.01M17 20h3M20 17v3"/>
          </svg>
          Scan QR Code
        </div>
        <div class="dd-sep"></div>
        <div class="dd-item danger" id="resetBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
          </svg>
          Reset & Disconnect
        </div>
      </div>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <a class="avatar-ring" id="avatarRing" href="#" onclick="return false;">
      <span class="avatar-icon" id="avatarIcon">📵</span>
    </a>
    <div class="number-label">Incoming Number</div>
    <div class="number-value idle" id="numberValue">Waiting for number…</div>
    <div class="number-time" id="numberTime"></div>
  </div>

  <!-- call initiated via avatar ring tap -->

  <!-- QR -->
  <div id="qr-reader"></div>

  <div class="divider"></div>

  <!-- RECENT CALLS -->
  <div class="recents">
    <div class="recents-header">
      <span class="recents-title">Recent Calls</span>
      <span class="recents-clear" id="clearHistory">Clear</span>
    </div>
    <div class="recent-list" id="recentList">
      <div class="recent-empty">No recent calls</div>
    </div>
  </div>

</div>

<input id="uidInput" type="hidden"/>
<div class="toast" id="toast"></div>

<script src="libs/firebase-app-compat.js"></script>
<script src="libs/firebase-database-compat.js"></script>
<script src="libs/html5-qrcode.min.js"></script>
<script>
(function () {
  /* ── refs ── */
  const uidInput    = document.getElementById('uidInput');
  const statusDot   = document.getElementById('statusDot');
  const avatarRing  = document.getElementById('avatarRing');
  const avatarIcon  = document.getElementById('avatarIcon');
  const numberValue = document.getElementById('numberValue');
  const numberTime  = document.getElementById('numberTime');
  const menuBtn     = document.getElementById('menuBtn');
  const dropdown    = document.getElementById('dropdown');
  const pasteUID    = document.getElementById('pasteUID');
  const scanQR      = document.getElementById('scanQR');
  const resetBtn    = document.getElementById('resetBtn');
  const qrReader    = document.getElementById('qr-reader');
  const recentList  = document.getElementById('recentList');
  const clearBtn    = document.getElementById('clearHistory');
  const toastEl     = document.getElementById('toast');

  let callRef = null, html5QrCode = null, qrScanning = false, toastTmr = null;

  /* ── Firebase ── */
  const cfg = {
    apiKey: "AIzaSyAKTNMVnl4W04_WH0PqsIA2xattjTR6x0M",
    authDomain: "call-from-browserss.firebaseapp.com",
    databaseURL: "https://call-from-browserss-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "call-from-browserss",
    storageBucket: "call-from-browserss.firebasestorage.app",
    messagingSenderId: "421459301855",
    appId: "1:421459301855:web:5f9581250da6cd3935a06a"
  };
  try { firebase.initializeApp(cfg); } catch(e){}
  const db = firebase.database();

  /* ── Toast ── */
  function toast(msg, icon='✓') {
    toastEl.innerHTML = `<span>${icon}</span>${msg}`;
    toastEl.classList.add('show');
    clearTimeout(toastTmr);
    toastTmr = setTimeout(() => toastEl.classList.remove('show'), 2600);
  }

  /* ── Number formatter ── */
  function fmt(raw) {
    const d = raw.replace(/\D/g,'');
    // BD: 01XXXXXXXXX (11 digits) or 8801XXXXXXXXX (13 digits)
    if (/^(880)?01[3-9]\d{8}$/.test(d)) {
      // strip country code, strip leading 0 → 1XXXXXXXXX (10 digits)
      const local = d.length === 13 ? d.slice(3) : d.slice(1); // e.g. 185XXXXXXX
      return `+880 ${local.slice(0,3)}-${local.slice(3,6)}-${local.slice(6)}`;
    }
    return raw;
  }

  /* ── BD Time ── */
  function bdTime(ts) {
    const d = ts ? new Date(ts) : new Date();
    return d.toLocaleTimeString('en-US', {
      timeZone: 'Asia/Dhaka',
      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
    });
  }
  function bdDate(ts) {
    const d = ts ? new Date(ts) : new Date();
    return d.toLocaleDateString('en-US', {
      timeZone: 'Asia/Dhaka',
      month: 'short', day: 'numeric'
    });
  }

  /* ── History (max 5) ── */
  function getHistory() { return JSON.parse(localStorage.getItem('callHistory')||'[]'); }
  function saveHistory(h) { localStorage.setItem('callHistory', JSON.stringify(h)); }

  function addHistory(number) {
    let h = getHistory();
    if (h.length && h[0].number === number) return;
    h.unshift({ number, ts: Date.now() });
    if (h.length > 5) h = h.slice(0, 5);
    saveHistory(h);
    renderHistory(h);
  }

  function renderHistory(h) {
    if (!h || !h.length) {
      recentList.innerHTML = '<div class="recent-empty">No recent calls</div>';
      return;
    }
    recentList.innerHTML = h.map(item => `
      <div class="recent-item">
        <div class="recent-icon">📞</div>
        <div class="recent-info">
          <div class="recent-num">${fmt(item.number)}</div>
          <div class="recent-time">${bdTime(item.ts)} &nbsp;·&nbsp; ${bdDate(item.ts)}</div>
        </div>
        <a class="recent-call" href="tel:${item.number}" title="Call">
          <svg viewBox="0 0 24 24" fill="#4caf72">
            <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.58.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1C10.29 21 3 13.71 3 5c0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.23 1.01L6.6 10.8z"/>
          </svg>
        </a>
      </div>`).join('');
  }

  /* ── UI state ── */
  function setConnected(yes) {
    statusDot.className = 'status-dot' + (yes ? ' on' : '');
  }
  function showNumber(number, ts) {
    const formatted = fmt(number);
    numberValue.textContent = formatted;
    numberValue.className = 'number-value';
    numberTime.textContent = bdTime(ts);
    numberTime.className = 'number-time visible';
    // turn ring into green call button
    avatarRing.href = `tel:${number}`;
    avatarRing.onclick = null;
    avatarRing.className = 'avatar-ring active callable flash';
    avatarIcon.textContent = '📞';
    setTimeout(() => avatarRing.classList.remove('flash'), 1400);
    if (navigator.vibrate) navigator.vibrate([180, 80, 180]);
    if (Notification.permission === 'granted') {
      new Notification('Incoming Number', { body: formatted });
    }
    addHistory(number);
  }
  function clearNumber() {
    numberValue.textContent = 'Waiting for number…';
    numberValue.className = 'number-value idle';
    numberTime.textContent = '';
    numberTime.className = 'number-time';
    // reset ring to idle
    avatarRing.href = '#';
    avatarRing.onclick = () => false;
    avatarRing.className = 'avatar-ring';
    avatarIcon.textContent = '📵';
  }

  /* ── Firebase listener ── */
  function attach(uid) {
    if (callRef) callRef.off();
    callRef = db.ref(`calls/${uid}`);
    setConnected(true);
    callRef.on('value', snap => {
      const d = snap.val();
      if (d && d.number) showNumber(d.number, d.timestamp);
      else clearNumber();
    });
  }
  function detach() {
    if (callRef) { callRef.off(); callRef = null; }
    setConnected(false);
    clearNumber();
  }
  function connect(uid) {
    if (!uid) return;
    uidInput.value = uid;
    localStorage.setItem('savedUID', uid);
    attach(uid);
    toast('Connected', '🔗');
  }

  /* ── Menu ── */
  menuBtn.addEventListener('click', e => { e.stopPropagation(); dropdown.classList.toggle('open'); });
  document.addEventListener('click', () => dropdown.classList.remove('open'));

  /* ── Paste UID ── */
  pasteUID.addEventListener('click', async () => {
    dropdown.classList.remove('open');
    try {
      const t = await navigator.clipboard.readText();
      if (t.trim()) connect(t.trim());
      else toast('Clipboard is empty', '⚠️');
    } catch {
      const m = prompt('Paste UID manually:');
      if (m && m.trim()) connect(m.trim());
    }
  });

  /* ── Reset ── */
  resetBtn.addEventListener('click', () => {
    dropdown.classList.remove('open');
    localStorage.removeItem('savedUID');
    uidInput.value = '';
    detach();
    toast('Disconnected', '🔄');
  });

  /* ── QR Scan ── */
  scanQR.addEventListener('click', async () => {
    dropdown.classList.remove('open');
    if (qrScanning) {
      await html5QrCode.stop().catch(()=>{});
      try { html5QrCode.clear(); } catch(e){}
      qrReader.style.display = 'none';
      qrScanning = false;
      return;
    }
    if (typeof Html5Qrcode === 'undefined') { toast('QR library not ready', '⚠️'); return; }
    qrReader.style.display = 'block';
    if (!html5QrCode) html5QrCode = new Html5Qrcode('qr-reader');
    qrScanning = true;
    try {
      const cams = await Html5Qrcode.getCameras();
      if (!cams || !cams.length) { toast('No camera found', '⚠️'); qrScanning = false; return; }
      let camId = cams[0].id;
      for (const c of cams) if (c.label.toLowerCase().includes('back')) { camId = c.id; break; }
      await html5QrCode.start(camId, { fps: 10, qrbox: 220 }, decoded => {
        connect(decoded);
        html5QrCode.stop().then(() => {
          try { html5QrCode.clear(); } catch(e){}
          qrReader.style.display = 'none';
          qrScanning = false;
        });
      }, () => {});
    } catch(e) {
      toast('Camera error', '⚠️');
      qrScanning = false;
    }
  });

  /* ── Clear history ── */
  clearBtn.addEventListener('click', () => {
    saveHistory([]);
    renderHistory([]);
    toast('History cleared', '🗑️');
  });

  /* ── Notifications ── */
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  /* ── Auto-connect ── */
  renderHistory(getHistory());
  const saved = localStorage.getItem('savedUID');
  if (saved) { uidInput.value = saved; attach(saved); setConnected(true); }

})();
</script>
</body>
</html>
